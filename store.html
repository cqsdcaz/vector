<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VECTOR | Product Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0609;
            --card-bg: #120b0f;
            --pink: #e85da2;
            --pink-dark: #c73e82;
            --text-dim: #a1a1a1;
            --border-subtle: #1f141a;
            --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 6%;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(11, 6, 9, 0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo {
            display: flex;
            align-items: center;
            font-weight: 900;
            letter-spacing: 1px;
            font-size: 1.3rem;
        }
        .logo span {
            background: var(--pink);
            padding: 2px 10px;
            border-radius: 8px;
            margin-right: 8px;
        }
        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-dim);
            font-weight: 500;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        .nav-links a:hover {
            color: white;
        }
        .btn-discord {
            background: var(--pink);
            padding: 8px 22px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-discord:hover {
            background: #ff6fb0;
            transform: scale(1.02);
        }

        /* store layout */
        .store-container {
            max-width: 1300px;
            margin: 40px auto 80px;
            padding: 0 5%;
        }

        /* breadcrumb */
        .breadcrumb {
            margin-bottom: 30px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .breadcrumb a {
            color: var(--pink);
            text-decoration: none;
        }
        .breadcrumb span {
            color: #aaa;
        }

        /* main product grid */
        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            background: rgba(18, 11, 15, 0.6);
            border-radius: 32px;
            padding: 30px;
            border: 1px solid var(--border-subtle);
            backdrop-filter: blur(2px);
            margin-bottom: 70px;
        }

        /* left side gallery */
        .product-gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .main-image {
            background: #1a1116;
            border-radius: 28px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2a1d24;
        }
        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .main-image img:hover {
            transform: scale(1.02);
        }
        .thumbnail-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .thumb {
            width: 80px;
            height: 80px;
            background: #1f141a;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .thumb.active {
            border-color: var(--pink);
        }
        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* right side info */
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .product-badge {
            background: var(--pink);
            display: inline-block;
            width: fit-content;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .product-info h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .price {
            font-size: 2.8rem;
            font-weight: 800;
            color: white;
        }
        .price small {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-dim);
        }
        .description {
            color: var(--text-dim);
            line-height: 1.6;
            font-size: 1rem;
            border-left: 3px solid var(--pink);
            padding-left: 18px;
            margin: 8px 0;
        }
        .features-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 12px 0;
        }
        .features-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: #ddd;
        }
        .features-list li::before {
            content: "✓";
            color: var(--pink);
            font-weight: bold;
        }
        .system-req {
            background: rgba(0,0,0,0.4);
            padding: 18px;
            border-radius: 20px;
            margin: 10px 0;
            border: 1px solid #241a20;
        }
        .system-req h4 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: var(--pink);
        }
        .system-req p {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .buy-actions {
            display: flex;
            gap: 18px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn-buy {
            background: var(--pink);
            border: none;
            padding: 16px 40px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            text-align: center;
        }
        .btn-buy:hover {
            background: #c73e82;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(232, 93, 162, 0.3);
        }

        /* additional info tabs */
        .product-tabs {
            margin-top: 20px;
            background: var(--card-bg);
            border-radius: 28px;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
        }
        .tab-header {
            display: flex;
            border-bottom: 1px solid var(--border-subtle);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 18px 0;
            font-weight: 700;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .tab-btn.active {
            color: var(--pink);
            border-bottom: 2px solid var(--pink);
            background: rgba(232, 93, 162, 0.05);
        }
        .tab-content {
            padding: 28px;
            display: none;
            color: #ddd;
        }
        .tab-content.active {
            display: block;
            animation: fade 0.3s;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Related products */
        .related-section {
            margin-top: 70px;
        }
        .related-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
        }
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 25px;
        }
        .related-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid var(--border-subtle);
            transition: 0.2s;
            text-decoration: none;
            color: white;
        }
        .related-card:hover {
            transform: translateY(-5px);
            border-color: var(--pink);
        }
        .related-card img {
            width: 100%;
            aspect-ratio: 1 / 0.9;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 15px;
            background: #1a1116;
        }
        .related-card h4 {
            font-size: 1.2rem;
        }
        .related-price {
            color: var(--pink);
            font-weight: 700;
            margin-top: 8px;
        }

        footer {
            padding: 50px 6%;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-dim);
            font-size: 0.85rem;
            flex-wrap: wrap;
            gap: 20px;
        }
        .footer-links {
            display: flex;
            gap: 28px;
            list-style: none;
        }
        .footer-links a {
            text-decoration: none;
            color: var(--text-dim);
        }
        @media (max-width: 800px) {
            .product-detail {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .product-info h1 {
                font-size: 2rem;
            }
            .features-list {
                grid-template-columns: 1fr;
            }
            .nav-links {
                display: none;
            }
        }

        /* CHECKOUT MODAL STYLES */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .checkout-modal {
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            max-width: 520px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 0;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .checkout-modal {
            transform: scale(1);
        }
        .checkout-header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .checkout-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
        }
        .close-modal {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-modal:hover {
            color: var(--pink);
        }
        .checkout-body {
            padding: 28px;
        }
        .order-summary {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 28px;
            border: 1px solid #241a20;
        }
        .order-summary h3 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: var(--pink);
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a1d24;
        }
        .order-total {
            display: flex;
            justify-content: space-between;
            padding-top: 12px;
            margin-top: 8px;
            font-weight: 800;
            font-size: 1.2rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .form-group input {
            width: 100%;
            background: #1a1116;
            border: 1px solid #33222b;
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--pink);
        }
        .crypto-select {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .crypto-option {
            background: #1a1116;
            border: 1px solid #33222b;
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .crypto-option.selected {
            border-color: var(--pink);
            background: rgba(232, 93, 162, 0.1);
        }
        .crypto-option .crypto-name {
            font-weight: 700;
        }
        .crypto-option .crypto-ticker {
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        .payment-section {
            background: #0f0a0d;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .payment-address {
            background: #00000033;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 0.8rem;
            word-break: break-all;
            margin: 12px 0;
            border: 1px dashed var(--pink);
        }
        .copy-btn {
            background: var(--pink);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .confirm-btn {
            width: 100%;
            background: var(--pink);
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            margin-top: 16px;
        }
        .confirm-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .secure-badge {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f1a1e;
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 500;
            border-left: 4px solid var(--pink);
            z-index: 2100;
            animation: fadeUp 0.3s ease;
            pointer-events: none;
        }
        @keyframes fadeUp {
            from { opacity: 0; bottom: 0; }
            to { opacity: 1; bottom: 30px; }
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1116;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--pink);
            border-radius: 10px;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

                </div>
                <div class="tab-content" id="tab-delivery">
                    <p><strong>Instant Delivery</strong> — After payment, you will receive access to your license key and download links immediately via email. We support crypto payments.</p>
                </div>
            </div>
        `;
        container.innerHTML = html;

        const tabBtns = document.querySelectorAll('.tab-btn');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                document.getElementById(`tab-${tabId}`)?.classList.add('active');
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        const checkoutBtn = document.getElementById('checkoutBtn');
        if(checkoutBtn) {
            checkoutBtn.addEventListener('click', () => openCheckoutModal(product));
        }
    }

    async function sendDiscordWebhook(orderData) {
        const embed = {
            title: "🛒 NEW ORDER RECEIVED",
            color: 0xe85da2,
            timestamp: new Date().toISOString(),
            fields: [
                {
                    name: "📦 Product",
                    value: orderData.productName,
                    inline: true
                },
                {
                    name: "💰 Amount",
                    value: `$${orderData.total}`,
                    inline: true
                },
                {
                    name: "💳 Payment Method",
                    value: orderData.paymentMethod,
                    inline: true
                },
                {
                    name: "📧 Email",
                    value: orderData.email,
                    inline: true
                },
                {
                    name: "🎮 Discord",
                    value: orderData.discord,
                    inline: true
                },
                {
                    name: "🆔 Order ID",
                    value: orderData.orderId,
                    inline: false
                }
            ],
            footer: {
                text: "VECTOR Store | Order Confirmation"
            }
        };

        const payload = {
            username: "Vector Store Bot",
            avatar_url: "https://cdn.discordapp.com/attachments/...",
            embeds: [embed],
            content: "@everyone **New order placed!**"
        };

        try {
            const response = await fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return true;
        } catch (error) {
            console.error("Webhook error:", error);
            return false;
        }
    }

    function generateOrderId() {
        return 'ORD-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substring(2, 6).toUpperCase();
    }

    function openCheckoutModal(product) {
        currentProduct = product;
        selectedCrypto = "Bitcoin";
        renderCheckoutContent(product);
        const modal = document.getElementById('checkoutModal');
        modal.classList.add('active');
    }

    function renderCheckoutContent(product) {
        const container = document.getElementById('checkoutBody');
        const walletAddress = cryptoWallets[selectedCrypto] || cryptoWallets.Bitcoin;
        const cryptoOptions = ["Bitcoin", "Ethereum", "Litecoin", "USDT (TRC20)"];
        
        const html = `
            <div class="order-summary">
                <h3>Order Summary</h3>
                <div class="order-item">
                    <span>${product.name}</span>
                    <span><strong>$${product.price}</strong></span>
                </div>
                <div class="order-total">
                    <span>Total</span>
                    <span><strong>$${product.price}</strong></span>
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="checkoutEmail" placeholder="your@email.com" value="customer@example.com">
            </div>
            <div class="form-group">
                <label>Discord Username</label>
                <input type="text" id="checkoutDiscord" placeholder="username#0000" value="user#1234">
            </div>
            <div class="crypto-select" id="cryptoSelect">
                ${cryptoOptions.map(crypto => `
                    <div class="crypto-option ${selectedCrypto === crypto ? 'selected' : ''}" data-crypto="${crypto}">
                        <div class="crypto-name">${crypto.split(' ')[0]}</div>
                        <div class="crypto-ticker">${crypto.includes('USDT') ? 'USDT' : crypto.substring(0,3).toUpperCase()}</div>
                    </div>
                `).join('')}
            </div>
            <div class="payment-section">
                <div style="font-weight:600; margin-bottom:8px;">Send exactly <strong>$${product.price}</strong> worth of ${selectedCrypto}</div>
                <div class="payment-address" id="walletAddress">${walletAddress}</div>
                <button class="copy-btn" id="copyAddressBtn">📋 Copy Address</button>
                <div style="font-size:0.7rem; margin-top:12px; color:#aaa;">Payment confirmed within 5-15 minutes</div>
            </div>
            <button class="confirm-btn" id="confirmOrderBtn">Confirm Order</button>
            <div class="secure-badge">
                🔒 Secure Payment • Instant Delivery • 24/7 Support
            </div>
        `;
        container.innerHTML = html;

        document.querySelectorAll('.crypto-option').forEach(opt => {
            opt.addEventListener('click', () => {
                selectedCrypto = opt.getAttribute('data-crypto');
                renderCheckoutContent(product);
            });
        });

        const copyBtn = document.getElementById('copyAddressBtn');
        if(copyBtn) {
            copyBtn.addEventListener('click', () => {
                const addr = document.getElementById('walletAddress')?.innerText;
                if(addr) {
                    navigator.clipboard.writeText(addr);
                    showToast("✅ Address copied to clipboard!");
                }
            });
        }

        const confirmBtn = document.getElementById('confirmOrderBtn');
        if(confirmBtn) {
            confirmBtn.addEventListener('click', () => handleConfirmOrder(product));
        }
    }

    async function handleConfirmOrder(product) {
        if (isProcessing) return;
        
        const email = document.getElementById('checkoutEmail')?.value.trim();
        const discord = document.getElementById('checkoutDiscord')?.value.trim();
        
        if (!email || email === "") {
            showToast("❌ Please enter your email address");
            return;
        }
        if (!discord || discord === "") {
            showToast("❌ Please enter your Discord username");
            return;
        }

        isProcessing = true;
        const confirmBtn = document.getElementById('confirmOrderBtn');
        const originalText = confirmBtn?.innerText;
        if (confirmBtn) {
            confirmBtn.innerHTML = '<span class="loading-spinner"></span> Processing...';
            confirmBtn.disabled = true;
        }

        const orderId = generateOrderId();
        const orderData = {
            orderId: orderId,
            productName: product.name,
            productPrice: product.price,
            total: product.price.toFixed(2),
            email: email,
            discord: discord,
            paymentMethod: selectedCrypto
        };

        try {
            const webhookSuccess = await sendDiscordWebhook(orderData);
            
            if (webhookSuccess) {
                showToast(`✅ Order confirmed! License sent to ${email} (demo)`);
                setTimeout(() => {
                    const modal = document.getElementById('checkoutModal');
                    modal.classList.remove('active');
                }, 2000);
            } else {
                showToast("⚠️ Order placed but notification failed. We'll contact you soon.");
                setTimeout(() => {
                    const modal = document.getElementById('checkoutModal');
                    modal.classList.remove('active');
                }, 2000);
            }
        } catch (error) {
            console.error("Order error:", error);
            showToast("❌ Error processing order. Please try again.");
        } finally {
            isProcessing = false;
            if (confirmBtn) {
                confirmBtn.innerHTML = originalText;
                confirmBtn.disabled = false;
            }
        }
    }

    function renderRelated(currentProduct) {
        const relatedGrid = document.getElementById('relatedProductsGrid');
        if(!relatedGrid) return;
        const otherProducts = productsDB.filter(p => p.id !== currentProduct.id).slice(0, 3);
        const relatedHtml = otherProducts.map(prod => `
            <a href="store.html?product=${prod.id}" class="related-card">
                <img src="${prod.imageThumb}" alt="${prod.name}" onerror="this.src='https://placehold.co/300x270/1a1116/e85da2?text=${encodeURIComponent(prod.name)}'">
                <h4>${prod.name}</h4>
                <p class="related-price">$${prod.price} lifetime</p>
                <small style="color:#aaa;">${prod.tag}</small>
            </a>
        `).join('');
        relatedGrid.innerHTML = relatedHtml || '<p style="color:gray;">No other products</p>';
    }

    let toastTimeout;
    function showToast(message, duration = 3000) {
        const existingToast = document.querySelector('.toast-msg');
        if(existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = message;
        document.body.appendChild(toast);
        if(toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.remove(), duration);
    }

    function initStore() {
        const product = getProductFromURL();
        renderProductDetail(product);
        renderRelated(product);
    }

    document.getElementById('closeModalBtn')?.addEventListener('click', () => {
        document.getElementById('checkoutModal').classList.remove('active');
    });
    document.getElementById('checkoutModal')?.addEventListener('click', (e) => {
        if(e.target === document.getElementById('checkoutModal')) {
            document.getElementById('checkoutModal').classList.remove('active');
        }
    });
    document.getElementById('discordNav')?.addEventListener('click', (e) => {
        e.preventDefault();
        showToast('✨ Join our Discord community for live support! (demo)');
    });

    initStore();
    window.addEventListener('popstate', () => {
        const newProduct = getProductFromURL();
        renderProductDetail(newProduct);
        renderRelated(newProduct);
    });
</script>
</body>
</html>
