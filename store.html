<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VECTOR | Product Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0609;
            --card-bg: #120b0f;
            --pink: #e85da2;
            --pink-dark: #c73e82;
            --text-dim: #a1a1a1;
            --border-subtle: #1f141a;
            --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 6%;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(11, 6, 9, 0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo {
            display: flex;
            align-items: center;
            font-weight: 900;
            letter-spacing: 1px;
            font-size: 1.3rem;
        }
        .logo span {
            background: var(--pink);
            padding: 2px 10px;
            border-radius: 8px;
            margin-right: 8px;
        }
        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-dim);
            font-weight: 500;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        .nav-links a:hover {
            color: white;
        }
        .btn-discord {
            background: var(--pink);
            padding: 8px 22px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-discord:hover {
            background: #ff6fb0;
            transform: scale(1.02);
        }

        /* store layout */
        .store-container {
            max-width: 1300px;
            margin: 40px auto 80px;
            padding: 0 5%;
        }

        /* breadcrumb */
        .breadcrumb {
            margin-bottom: 30px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .breadcrumb a {
            color: var(--pink);
            text-decoration: none;
        }
        .breadcrumb span {
            color: #aaa;
        }

        /* main product grid */
        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            background: rgba(18, 11, 15, 0.6);
            border-radius: 32px;
            padding: 30px;
            border: 1px solid var(--border-subtle);
            backdrop-filter: blur(2px);
            margin-bottom: 70px;
        }

        /* left side gallery */
        .product-gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .main-image {
            background: #1a1116;
            border-radius: 28px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2a1d24;
        }
        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .main-image img:hover {
            transform: scale(1.02);
        }
        .thumbnail-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .thumb {
            width: 80px;
            height: 80px;
            background: #1f141a;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .thumb.active {
            border-color: var(--pink);
        }
        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* right side info */
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .product-badge {
            background: var(--pink);
            display: inline-block;
            width: fit-content;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .product-info h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .price {
            font-size: 2.8rem;
            font-weight: 800;
            color: white;
        }
        .price small {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-dim);
        }
        .description {
            color: var(--text-dim);
            line-height: 1.6;
            font-size: 1rem;
            border-left: 3px solid var(--pink);
            padding-left: 18px;
            margin: 8px 0;
        }
        .features-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 12px 0;
        }
        .features-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: #ddd;
        }
        .features-list li::before {
            content: "✓";
            color: var(--pink);
            font-weight: bold;
        }
        .system-req {
            background: rgba(0,0,0,0.4);
            padding: 18px;
            border-radius: 20px;
            margin: 10px 0;
            border: 1px solid #241a20;
        }
        .system-req h4 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: var(--pink);
        }
        .system-req p {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .buy-actions {
            display: flex;
            gap: 18px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn-buy {
            background: var(--pink);
            border: none;
            padding: 16px 40px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            text-align: center;
        }
        .btn-buy:hover {
            background: #c73e82;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(232, 93, 162, 0.3);
        }

        /* additional info tabs */
        .product-tabs {
            margin-top: 20px;
            background: var(--card-bg);
            border-radius: 28px;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
        }
        .tab-header {
            display: flex;
            border-bottom: 1px solid var(--border-subtle);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 18px 0;
            font-weight: 700;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .tab-btn.active {
            color: var(--pink);
            border-bottom: 2px solid var(--pink);
            background: rgba(232, 93, 162, 0.05);
        }
        .tab-content {
            padding: 28px;
            display: none;
            color: #ddd;
        }
        .tab-content.active {
            display: block;
            animation: fade 0.3s;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Related products */
        .related-section {
            margin-top: 70px;
        }
        .related-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
        }
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 25px;
        }
        .related-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid var(--border-subtle);
            transition: 0.2s;
            text-decoration: none;
            color: white;
        }
        .related-card:hover {
            transform: translateY(-5px);
            border-color: var(--pink);
        }
        .related-card img {
            width: 100%;
            aspect-ratio: 1 / 0.9;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 15px;
            background: #1a1116;
        }
        .related-card h4 {
            font-size: 1.2rem;
        }
        .related-price {
            color: var(--pink);
            font-weight: 700;
            margin-top: 8px;
        }

        footer {
            padding: 50px 6%;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-dim);
            font-size: 0.85rem;
            flex-wrap: wrap;
            gap: 20px;
        }
        .footer-links {
            display: flex;
            gap: 28px;
            list-style: none;
        }
        .footer-links a {
            text-decoration: none;
            color: var(--text-dim);
        }
        @media (max-width: 800px) {
            .product-detail {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .product-info h1 {
                font-size: 2rem;
            }
            .features-list {
                grid-template-columns: 1fr;
            }
            .nav-links {
                display: none;
            }
        }

        /* CHECKOUT MODAL - CUMBRA STYLE */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .checkout-modal {
            background: linear-gradient(135deg, #0f0a0e 0%, #0b0609 100%);
            border: 1px solid rgba(232, 93, 162, 0.3);
            border-radius: 28px;
            max-width: 480px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 0;
            transform: scale(0.95);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-overlay.active .checkout-modal {
            transform: scale(1);
        }
        .checkout-header {
            padding: 24px 28px 16px 28px;
            border-bottom: 1px solid rgba(232, 93, 162, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .checkout-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--pink));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .checkout-header .protected {
            font-size: 0.7rem;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
        }
        .close-modal {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1;
        }
        .close-modal:hover {
            color: var(--pink);
        }
        .checkout-body {
            padding: 24px 28px 32px;
        }
        .order-item-row {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .order-item-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .order-item-details {
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .order-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--pink);
            text-align: right;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .form-group input {
            width: 100%;
            background: #1a1116;
            border: 1px solid #33222b;
            border-radius: 14px;
            padding: 14px 16px;
            color: white;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--pink);
        }
        .form-hint {
            font-size: 0.7rem;
            color: #666;
            margin-top: 6px;
        }
        .coupon-input {
            background: #1a1116;
            border: 1px solid #33222b;
            border-radius: 14px;
            padding: 12px 16px;
            width: 100%;
            color: white;
            font-size: 0.9rem;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }
        .checkbox-group input {
            width: 18px;
            height: 18px;
            accent-color: var(--pink);
        }
        .checkbox-group label {
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .checkbox-group a {
            color: var(--pink);
            text-decoration: none;
        }
        .pay-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(232, 93, 162, 0.3);
        }
        .pay-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .secure-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.7rem;
            color: #555;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f1a1e;
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 500;
            border-left: 4px solid var(--pink);
            z-index: 2100;
            animation: fadeUp 0.3s ease;
            pointer-events: none;
        }
        @keyframes fadeUp {
            from { opacity: 0; bottom: 0; }
            to { opacity: 1; bottom: 30px; }
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1116;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--pink);
            border-radius: 10px;
        }
    </style>
</head>

    let currentProduct = null;

    function getProductFromURL() {
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('product');
        if(productId) {
            const found = productsDB.find(p => p.id === productId);
            if (found) return found;
        }
        return productsDB[0];
    }

    function renderProductDetail(product) {
        if(!product) return;
        currentProduct = product;
        document.title = `VECTOR | ${product.name}`;
        const breadcrumbSpan = document.getElementById('productNameBreadcrumb');
        if(breadcrumbSpan) breadcrumbSpan.innerText = product.name;
        
        const container = document.getElementById('productDetailRoot');
        if(!container) return;

        const featuresHtml = product.features.map(f => `<li>${f}</li>`).join('');
        
        const html = `
            <div class="product-detail">
                <div class="product-gallery">
                    <div class="main-image">
                        <img src="${product.imageMain}" alt="${product.name}" onerror="this.src='https://placehold.co/600x600/1a1116/e85da2?text=${encodeURIComponent(product.name)}'">
                    </div>
                    <div class="thumbnail-row">
                        <div class="thumb active"><img src="${product.imageThumb}" alt="main" onerror="this.src='https://placehold.co/80x80/1a1116/e85da2?text=IMG'"></div>
                    </div>
                </div>
                <div class="product-info">
                    <div class="product-badge" style="background:${product.badgeColor || '#e85da2'}">${product.tag}</div>
                    <h1>${product.name}</h1>
                    <div class="price">$${product.price} <small>/ lifetime</small></div>
                    <div class="description">${product.desc}</div>
                    <ul class="features-list">${featuresHtml}</ul>
                    <div class="system-req">
                        <h4>⚙️ System Requirements</h4>
                        <p>${product.sysReq}</p>
                    </div>

                        <button class="btn-buy" id="checkoutBtn">Buy Now - $${product.price}</button>
                    </div>
                </div>
            </div>
            <div class="product-tabs">
                <div class="tab-header">
                    <button class="tab-btn active" data-tab="details">📖 Full Details</button>
                    <button class="tab-btn" data-tab="updates">🔄 Updates & Support</button>
                    <button class="tab-btn" data-tab="delivery">⚡ Delivery Info</button>
                </div>
                <div class="tab-content active" id="tab-details">
                    <p>${product.longDesc || product.desc}</p>
                    <p style="margin-top: 12px;">✔️ <strong>Undetected status:</strong> Verified every patch.<br>✔️ <strong>Privacy-first:</strong> No data logging.<br>✔️ <strong>Compatibility:</strong> Works with all major anti-cheats.</p>
                </div>
                <div class="tab-content" id="tab-updates">
                    <p><strong>Free Lifetime Updates</strong> — All products include free updates forever. Join our Discord for instant patch notifications. 24/7 ticket support.</p>
                    <p style="margin-top: 12px;">✅ Automatic updater included<br>✅ Priority support for all customers<br>✅ Changelog available in Discord</p>
                </div>
                <div class="tab-content" id="tab-delivery">
                    <p><strong>Instant Delivery</strong> — After payment, you will receive access to your license key and download links immediately via email. We support crypto payments.</p>
                    <p style="margin-top: 12px;">📧 Email delivery within 1-2 minutes<br>🔐 Lifetime license key (no expiry)<br>📥 Direct download from secure CDN</p>
                </div>
            </div>
        `;
        container.innerHTML = html;

        const tabBtns = document.querySelectorAll('.tab-btn');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                document.getElementById(`tab-${tabId}`)?.classList.add('active');
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        const checkoutBtn = document.getElementById('checkoutBtn');
        if(checkoutBtn) {
            checkoutBtn.addEventListener('click', () => openCheckoutModal(product));
        }
    }

    function openCheckoutModal(product) {
        currentProduct = product;
        renderCheckoutContent(product);
        const modal = document.getElementById('checkoutModal');
        modal.classList.add('active');
    }

    function renderCheckoutContent(product) {
        const container = document.getElementById('checkoutBody');
        
        const html = `
            <div class="order-item-row">
                <div class="order-item-title">${product.name}</div>
                <div class="order-item-details">
                    <span>Lifetime Key — Qty: 1</span>
                    <span>$${product.price}</span>
                </div>
                <div class="order-price">$${product.price}</div>
            </div>
            
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="checkoutEmail" placeholder="your@email.com" value="customer@example.com">
                <div class="form-hint">Order details and download link will be sent here.</div>
            </div>
            
            <div class="form-group">
                <label>Coupon Code (optional)</label>
                <input type="text" id="couponCode" class="coupon-input" placeholder="Enter code...">
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="termsCheckbox">
                <label>I agree to the <a href="#" id="termsLink">Terms of Service</a> *</label>
            </div>
            <div class="form-hint" style="margin-top: -12px; margin-bottom: 16px;">By checking this box you agree to our Terms and Conditions.</div>
            
            <button class="pay-btn" id="payNowBtn">Pay Now →</button>
            
            <div class="secure-footer">
                <span>🔒 Secured by Umbra & Sellhub</span>
            </div>
        `;
        container.innerHTML = html;

        const payBtn = document.getElementById('payNowBtn');
        
        if (payBtn) {
            payBtn.addEventListener('click', () => handlePayNow(product));
        }
        
        // Terms link
        const termsLink = document.getElementById('termsLink');
        if (termsLink) {
            termsLink.addEventListener('click', (e) => {
                e.preventDefault();
                showToast("📜 View Terms of Service (demo)");
            });
        }
    }

    function handlePayNow(product) {
        if (isProcessing) return;
        
        const email = document.getElementById('checkoutEmail')?.value.trim();
        const termsChecked = document.getElementById('termsCheckbox')?.checked;
        
        if (!email || email === "") {
            showToast("❌ Please enter your email address");
            return;
        }
        if (!termsChecked) {
            showToast("❌ You must agree to the Terms of Service");
            return;
        }
        
        isProcessing = true;
        const payBtn = document.getElementById('payNowBtn');
        if (payBtn) {
            payBtn.innerHTML = '<span class="loading-spinner"></span> Redirecting...';
            payBtn.disabled = true;
        }
        
        showToast("🔄 Redirecting to secure checkout...", 2000);
        
        setTimeout(() => {
            if (product.paymentLink) {
                window.location.href = product.paymentLink;
            } else {
                showToast("Demo: Redirecting to payment gateway...");
                setTimeout(() => {
                    window.location.href = `https://sellhub.com/checkout/${product.id}`;
                }, 500);
            }
            isProcessing = false;
        }, 800);
    }

    function renderRelated(currentProduct) {
        const relatedGrid = document.getElementById('relatedProductsGrid');
        if(!relatedGrid) return;
        const otherProducts = productsDB.filter(p => p.id !== currentProduct.id).slice(0, 3);
        const relatedHtml = otherProducts.map(prod => `
            <a href="store.html?product=${prod.id}" class="related-card">
                <img src="${prod.imageThumb}" alt="${prod.name}" onerror="this.src='https://placehold.co/300x270/1a1116/e85da2?text=${encodeURIComponent(prod.name)}'">
                <h4>${prod.name}</h4>
                <p class="related-price">$${prod.price} lifetime</p>
                <small style="color:#aaa;">${prod.tag}</small>
            </a>
        `).join('');
        relatedGrid.innerHTML = relatedHtml || '<p style="color:gray;">No other products</p>';
    }

    let toastTimeout;
    function showToast(message, duration = 3000) {
        const existingToast = document.querySelector('.toast-msg');
        if(existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = message;
        document.body.appendChild(toast);
        if(toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.remove(), duration);
    }

    function initStore() {
        const product = getProductFromURL();
        renderProductDetail(product);
        renderRelated(product);
    }

    document.getElementById('closeModalBtn')?.addEventListener('click', () => {
        document.getElementById('checkoutModal').classList.remove('active');
    });
    document.getElementById('checkoutModal')?.addEventListener('click', (e) => {
        if(e.target === document.getElementById('checkoutModal')) {
            document.getElementById('checkoutModal').classList.remove('active');
        }
    });
    document.getElementById('discordNav')?.addEventListener('click', (e) => {
        e.preventDefault();
        showToast('✨ Join our Discord community for live support! (demo)');
    });

    initStore();
    window.addEventListener('popstate', () => {
        const newProduct = getProductFromURL();
        renderProductDetail(newProduct);
        renderRelated(newProduct);
    });
    
    // Simple loading spinner style add
    const style = document.createElement('style');
    style.textContent = `
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    `;
    document.head.appendChild(style);
</script>
</body>
</html>
